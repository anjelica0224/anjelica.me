- note1: 
  id: first
  body: When you consider things like the stars, our affairs don't seem to matter very much, do they?
  author: Virginia Woolf
- note1: 
  id: third
  body: To live is the rarest thing in the world. Most people exist, that is all.
  author: Oscar Wilde
- note1: 
  id: foirth
  body: I felt my existence was tainted, in some subtle but essential way.
  author: Donna Tart
- note1: 
  id: sec
  body: I don't like work--no man does--but I like what is in the work--the chance to find yourself. Your own reality--for yourself not for others--what no other man can ever know. They can only see the mere show, and never can tell what it really means.
  author: Joseph Conrad
- note1:
  id: fifth
  body: We are all broken, that's how the light gets in.
  author: Ernest Hemingway
- note1:
  id: sixth
  body: The cosmos is within us. We are made of star-stuff. We are a way for the universe to know itself.
  author: Carl Sagan
- note1:
  id: seventh
  body: One must still have chaos in oneself to be able to give birth to a dancing star.
  author: Friedrich Nietzsche
- note1:
  id: eighth
  body: She was a wild one; always stomping on eggshells that everyone else tiptoed on.
  author: Kaitlin Foster
- note1:
  id: ninth
  body: Perhaps all the dragons in our lives are princesses who are only waiting to see us act, just once, with beauty and courage.
  author: Rainer Maria Rilke
- note1:
  id: tenth
  body: I have sea foam in my veins, I understand the language of waves.
  author: Jean Cocteau
- note1:
  id: eleventh
  body: The wound is the place where the Light enters you.
  author: Rumi
- note1:
  id: twelfth
  body: I am not what happened to me, I am what I choose to become.
  author: Carl Jung
- note1:
  id: thirteenth
  body: There is a crack in everything, that's how the light gets in.
  author: Leonard Cohen
- note1:
  id: fourteenth
  body: Do I dare disturb the universe?
  author: T.S. Eliot
- note1:
  id: fifteenth
  body: I took a deep breath and listened to the old brag of my heart. I am, I am, I am.
  author: Sylvia Plath
- note1:
  id: sixteenth
  body: And those who were seen dancing were thought to be insane by those who could not hear the music.
  author: Friedrich Nietzsche